name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
    # Also rebuild on version tags so mkdocs-material re-queries the GitHub API
    # and bakes the new latest-release version into the site header (the site
    # is built before the release exists otherwise, leaving the old version).
    # A `release: published` trigger does NOT work here: that release is created
    # by release.yml using GITHUB_TOKEN, and GITHUB_TOKEN-triggered events don't
    # start new workflow runs. The tag push (this v* tag) does trigger.
    tags:
      - 'v*'
  workflow_dispatch:

# Deploy via the GitHub Actions Pages pipeline (Settings -> Pages -> Source:
# "GitHub Actions"). This replaces `mkdocs gh-deploy` pushing to the gh-pages
# branch, which triggered GitHub's *managed* "pages build and deployment" whose
# deploy step intermittently 401'd. Deploying in-workflow with explicit token
# scopes is self-contained and avoids that second, unmanaged workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs build --strict
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The Pages API rejects a deployment while another is still settling, so
      # near-simultaneous triggers (a v* tag pushed moments after a docs change
      # lands on main) can fail the first attempt. Retry once after a pause.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retrying the deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
