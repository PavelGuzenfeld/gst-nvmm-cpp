name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  # Rebuild when a release is published so mkdocs-material re-queries the GitHub
  # API and bakes the new latest-release version into the site header. Without
  # this, a release created after the last docs push leaves the site showing the
  # previous version.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # to push the built site to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs build --strict
      - run: mkdocs gh-deploy --force
