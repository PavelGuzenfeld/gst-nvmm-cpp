site_name: gst-nvmm-cpp
site_description: >-
  Zero-copy NVMM-native GStreamer elements for NVIDIA Jetson — open-source,
  lightweight, no DeepStream.
site_url: https://pavelguzenfeld.com/gst-nvmm-cpp/
repo_url: https://github.com/PavelGuzenfeld/gst-nvmm-cpp
repo_name: PavelGuzenfeld/gst-nvmm-cpp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Elements:
      - nvmmconvert: elements/nvmmconvert.md
      - nvmmcompositor: elements/nvmmcompositor.md
      - nvmmofa: elements/nvmmofa.md
      - nvmmsink: elements/nvmmsink.md
      - nvmmappsrc: elements/nvmmappsrc.md
      - nvmmalloc: elements/nvmmalloc.md
  - Zero-copy IPC: ipc.md
  - Metadata over IPC: metadata-ipc.md
  - Pipeline examples: pipelines.md
  - Validation & benchmarks: validation.md
  - Roadmap:
      - Hardware-acceleration plan: HW_ACCEL_EXPLORATION.md
      - Production plan: PRODUCTION_PLAN.md
