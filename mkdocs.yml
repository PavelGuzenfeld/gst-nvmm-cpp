site_name: gst-nvmm-cpp
site_description: >-
  Zero-copy NVMM-native GStreamer elements for NVIDIA Jetson — open-source,
  lightweight, no DeepStream.
site_url: https://pavelguzenfeld.com/gst-nvmm-cpp/
repo_url: https://github.com/PavelGuzenfeld/gst-nvmm-cpp
repo_name: PavelGuzenfeld/gst-nvmm-cpp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Elements:
      - Memory & IPC:
          - nvmmalloc: elements/nvmmalloc.md
          - nvmmsink: elements/nvmmsink.md
          - nvmmappsrc: elements/nvmmappsrc.md
      - Video processing:
          - nvmmconvert: elements/nvmmconvert.md
          - nvmmcompositor: elements/nvmmcompositor.md
      - Inference & analytics:
          - nvmminfer: elements/nvmminfer.md
          - nvmmtracker: elements/nvmmtracker.md
          - nvmmsamurai: elements/nvmmsamurai.md
          - nvmmfusekf: elements/nvmmfusekf.md
          - nvmmofa: elements/nvmmofa.md
          - nvmmfusion: elements/nvmmfusion.md
          - nvmmsecondaryinfer: elements/nvmmsecondaryinfer.md
          - nvmmdrawdet: elements/nvmmdrawdet.md
  - Pipeline examples: pipelines.md
  - Single-object tracker pipeline: tracker-pipeline.md
  - Inference graphs: inference-graphs.md
  - Zero-copy IPC: ipc.md
  - Metadata over IPC: metadata-ipc.md
  - Creating a new element: extending.md
  - Validation & benchmarks: validation.md
  - Roadmap:
      - Hardware-acceleration plan: HW_ACCEL_EXPLORATION.md
      - Production plan: PRODUCTION_PLAN.md
      - nvmminfer design (B5): B5_NVMMINFER_DESIGN.md
